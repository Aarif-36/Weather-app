<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body class="container">

    <div class="main-content">
    
    <div class="video-container">
    <video id="bgVideo" autoplay muted loop>
    <source src="" type="video/mp4">
    </video>
    </div>

    <img src="Image/wheatherLogo.png" alt="Weather Icon" style="display: block; margin: 0 auto 20px; width: 100px;">
    <h1>WeatherX</h1>
     <div class="search-container">
    <div class="input-wrapper">
        <input type="text" id="cityInput" placeholder="Search city...">

        <span class="clear-btn" onclick="clearInput()">
            <i class="fa-solid fa-xmark"></i>
        </span>
    </div>

    <button class="search-btn" onclick="getWeather()">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    </div>
    <div id="weatherResult">
        <p id="error-msg" style="color: red;"></p>
        <h1 id="dist">Coimbatore</h1>
        <h1 id="dayNight"></h1>
        <h1 id="temp">0°C</h1>
        <img id="weather-icon" src="" alt="Weather Icon">
        <h1 id="weather-desc">Clear Sky</h1>
        <div class='wind-desc3'>
            <img src="Image/humidity.svg" alt="">
            <img src="Image/wind.svg" alt="">
        </div>
        <div class="wind-desc1">
            <h2>Humidity</h2>
            <h2>Wind Speed</h2>
        </div>
        <div class="wind-desc2">
            <p id="humidity">0%</p>
            <p id="wind-speed">0km/hr</p>
        </div>
        <div class="sun-time">
            <div class="suns"><h5>Sunrise :</h5><p id="sunrise"></p></div>
            <div class="suns"><h5>Sunset:</h5><p id="sunset"></p></div>
        </div>
    </div>
    </div>
    

    <script src="main.js"></script>
</body>
</html>
